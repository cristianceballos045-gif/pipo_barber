<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pipo Barber</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b2d16;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    img {
      width: 180px;
      margin-bottom: 40px;

      /* efecto para que el logo blanco se vea bien */
      background: #0b2d16;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
    }

    a {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 260px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      transform: scale(1.08);
    }

    .whatsapp {
      background: #25D366;
      color: white;
    }

    .instagram {
      background: linear-gradient(45deg, #833AB4, #E1306C, #F77737);
      color: white;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- TU LOGO (con espacios corregidos para web) -->
    <img src="Post%20para%20Instagram%20Barbería%20Moderno%20Minimalista%20Negro.png" alt="Pipo Barber">

    <!-- BOTONES -->
    <a href="https://wa.me/TUNUMERO" target="_blank" class="whatsapp">
      WhatsApp
    </a>

    <a href="https://www.instagram.com/pipobarber._?igsh=dmdmdTR0eDdob3Bz" target="_blank" class="instagram">
      Instagram
    </a>

  </div>

</body>
</html>
