<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- 🔥 IMPORTANTE (esto arregla el tamaño en celular) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pipo Barber</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b2d16;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
      padding: 20px;
    }

    img {
      width: 70%; /* 🔥 se adapta al celular */
      max-width: 220px;
      margin-bottom: 40px;

      background: #0b2d16;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
    }

    a {
      display: block;
      margin: 15px auto;
      padding: 18px;
      width: 90%; /* 🔥 ancho completo en celular */
      max-width: 320px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      transform: scale(1.05);
    }

    .whatsapp {
      background: #25D366;
      color: white;
    }

    .instagram {
      background: linear-gradient(45deg, #833AB4, #E1306C, #F77737);
      color: white;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- TU LOGO -->
    <img src="logo.png" alt="Pipo Barber">

    <!-- BOTONES -->
    <a href="https://wa.me/TUNUMERO" target="_blank" class="whatsapp">
      WhatsApp
    </a>

    <a href="https://www.instagram.com/pipobarber._?igsh=dmdmdTR0eDdob3Bz" target="_blank" class="instagram">
      Instagram
    </a>

  </div>

</body>
</html>
