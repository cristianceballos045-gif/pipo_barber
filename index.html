<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipo Barber</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b2d16;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #e9e9e9;
      width: 90%;
      max-width: 350px;
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* LOGO */
    .logo {
      width: 70%;
      max-width: 180px;
      margin-bottom: 40px;
    }

    /* BOTONES */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      padding: 15px;
      width: 85%;
      border-radius: 40px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      box-shadow: 0 6px 0 rgba(0,0,0,0.3);
      transition: 0.2s;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.3);
    }

    /* INSTAGRAM */
    .instagram {
      background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
    }

    /* WHATSAPP */
    .whatsapp {
      background: #25D366;
      color: black;
      border: 2px solid #000;
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- LOGO -->
    <img src="Post%20para%20Instagram%20Barbería%20Moderno%20Minimalista%20Negro.png" class="logo">

    <!-- INSTAGRAM -->
    <a href="https://www.instagram.com/pipobarber._?igsh=dmdmdTR0eDdob3Bz" target="_blank" class="btn instagram">
      Instagram
    </a>

    <!-- WHATSAPP -->
    <a href="https://wa.me/TUNUMERO" target="_blank" class="btn whatsapp">
      WhatsApp
    </a>

  </div>

</body>
</html>
