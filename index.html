<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Barbería</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial;
      background: linear-gradient(135deg, #0f2e1f, #071a12);
      color: #f5d547;
      text-align: center;
      padding-top: 50px;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    img {
      width: 140px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 3px solid #f5d547;
      background: white;
    }

    h1 {
      margin-bottom: 10px;
      color: #f5d547;
    }

    p {
      margin-bottom: 30px;
      color: #ccc;
    }

    a {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 260px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      transform: scale(1.07);
    }

    .whatsapp {
      background: #25D366;
      color: white;
    }

    .instagram {
      background: #E1306C;
      color: white;
    }

    .extra {
      background: transparent;
      border: 2px solid #f5d547;
      color: #f5d547;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" alt="Logo Barbería">

    <!-- NOMBRE -->
    <h1>Barbería El Estilo</h1>
    <p>Cortes modernos • Fade • Barba</p>

    <!-- BOTONES -->
    <a href="https://wa.me/56912345678" target="_blank" class="whatsapp">
      Reservar por WhatsApp
    </a>

    <a href="https://instagram.com/tu_usuario" target="_blank" class="instagram">
      Ver Instagram
    </a>

  </div>

</body>
</html>
